source:
  repo: DocOps/lab
  ref: v1
  
docs:
  - source: docs/agent/skills/*.md
    target: .agent/docs/skills
    synced: true
  - source: docs/agent/topics/*.md
    target: .agent/docs/topics
    synced: true
  - source: docs/agent/roles/*.md
    target: .agent/docs/roles
    synced: true
  - source: docs/agent/missions/*.md
    target: .agent/docs/missions
    synced: true

templates:
  manifest:
    - source: templates/AGENTS.markdown
      target: AGENTS.md
    - source: templates/gitignore
      target: .gitignore
    - source: templates/README.asciidoc
      target: README.adoc
    - source: templates/README.asciidoc
      target: gems/docopslab-dev/README.adoc

tools:
  - tool: rubocop
    files:
      - source: rubocop/base.yml
        target: .config/.vendor/docopslab/rubocop.yml
        synced: true
      - source: rubocop/project.yml
        target: .config/rubocop.yml
        synced: false

  - tool: vale
    files:
      - source: vale/base.ini
        target: .config/.vendor/docopslab/vale.ini
        synced: true
      - source: vale/project.ini
        target: .config/vale.local.ini
        synced: false
    paths:
      lint: ['.']
      skip:
        - _blog/_asciidoc-snippets.adoc
        - _blog/_asciidoc-crazy-table-snippet.adoc
        - _docs/partials/built/*
        - _projects/**/*
        - _docs/reference/_asciidoc-syntax.adoc
        - _docs/agent/**/*
        - .agent/**/*
        - .bundle/**/*
      exts: ['adoc']
      # git_tracked_only: false

  - tool: htmlproofer
    files:
      - source: htmlproofer/base.yml
        target: .config/.vendor/docopslab/htmlproofer.yml
        synced: true
      - source: htmlproofer/project.yml
        target: .config/htmlproofer.local.yml
        synced: false
    paths:
      lint: _site

  - tool: shellcheck
    files:
      - source: shellcheck/base.shellcheckrc
        target: .config/shellcheckrc
        synced: true
  
  - tool: actionlint
    files:
      - source: actionlint/base.yml
        target: .config/.vendor/docopslab/actionlint.yml
        synced: true
      - source: actionlint/project.yml
        target: .config/actionlint.yml
        synced: false

# Local library declaration used by lab release and local tests
library:
  enabled: true
  # source is the canonical remote layout; for local repo testing we provide
  # a `lab/library/current` directory that matches the expected layout.
  source:
    type: git-branch
    repo: DocOps/lab
    ref: labdev-library
    # path omitted: branch root IS the library layout
  # For monorepo publishing/testing, use this path as the source to publish
  local_path: library/current
  # publish method defaults: local only for testing; production workflows may
  # push to remote via a maintainer-only task.
  publish:
    local: true
